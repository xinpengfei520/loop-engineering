name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Lockfile committed → reproducible installs via `npm ci`.
      - run: npm ci
      - run: npm run lint
      - run: npm test
